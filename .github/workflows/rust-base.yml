name: 'Rust Base CI'
on:
  workflow_call:
    inputs:
      test-all-features:
        description: 'Test with all features enabled'
        required: false
        default: true
        type: boolean
      rust-channel:
        description: 'Rust channel to use'
        required: false
        default: 'stable'
        type: string
      install-foundry:
        description: 'Installs foundry as a pre-test step'
        required: false
        default: false
        type: boolean
      require-lockfile:
        description: 'Require a Cargo.lock file to be present'
        required: false
        default: false
        type: boolean
      requires-private-deps:
        description: 'Requires private dependencies to be fetched, sets up ssh-agent'
        required: false
        default: false
        type: boolean
      rust-profile:
        description: 'The profile to give to cargo for running, defaults to dev'
        required: false
        default: 'dev'
        type: string
      cargo-build-jobs:
        description: 'The number of concurrent build/compilation jobs, reasonable default is cores/2'
        type: string
        default: '4'
        required: false
    secrets:
      SSH_PRIVATE_KEY:
        description: 'SSH private key for fetching private dependencies'
        required: false
      SSH_PRIVATE_KEY_2:
        description: 'SSH private key for fetching private dependencies'
        required: false
      SSH_PRIVATE_KEY_3:
        description: 'SSH private key for fetching private dependencies'
        required: false
jobs:
  test:
    name: Test Suite
    runs-on:
      group: init4-runners
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup ssh-agent
        if: ${{ inputs.requires-private-deps == true }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
            ${{ secrets.SSH_PRIVATE_KEY_2 }}
            ${{ secrets.SSH_PRIVATE_KEY_3 }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Optional Foundry Install
        if: ${{ inputs.install-foundry == true }}
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - if: ${{ inputs.require-lockfile == true }}
        name: Run tests
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs }}
        run: |
          cargo nextest run ${{ inputs.test-all-features && '--all-features' || '' }} --workspace --locked  --cargo-profile ${{ inputs.rust-profile }} --no-tests=warn
      - if: ${{ inputs.require-lockfile == false }}
        name: Run tests
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs }}
        run: |
          cargo nextest run ${{ inputs.test-all-features && '--all-features' || '' }} --workspace  --cargo-profile ${{ inputs.rust-profile }} --no-tests=warn

  # We need a separate job for doctests because they are not run in the main test job with nextest.
  doctest:
    runs-on:
      group: init4-runners
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo test --workspace --doc ${{ inputs.test-all-features && '--all-features' || '' }}

  rustfmt:
    name: Rustfmt
    runs-on:
      group: init4-runners
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on:
      group: init4-runners
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup ssh-agent
        if: ${{ inputs.requires-private-deps == true }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
            ${{ secrets.SSH_PRIVATE_KEY_2 }}
            ${{ secrets.SSH_PRIVATE_KEY_3 }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - if: ${{ inputs.require-lockfile == true }}
        name: Clippy check
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: cargo clippy --all-targets --all-features --workspace --locked --profile ${{ inputs.rust-profile }} -- -D warnings
      - if: ${{ inputs.require-lockfile == false }}
        name: Clippy check
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: cargo clippy --all-targets --all-features --workspace --profile ${{ inputs.rust-profile }} -- -D warnings
      - if: ${{ inputs.require-lockfile == true }}
        name: Clippy check (no-default-features)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: cargo clippy --lib --bins --no-default-features --workspace --locked --profile ${{ inputs.rust-profile }} -- -D warnings
      - if: ${{ inputs.require-lockfile == false }}
        name: Clippy check (no-default-features)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: cargo clippy --lib --bins --no-default-features --workspace --profile ${{ inputs.rust-profile }} -- -D warnings

  dylint:
    name: Dylint
    runs-on:
      group: init4-runners
    env:
      NIGHTLY: nightly-2026-03-17
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Check for dylint opt-out
        id: check
        run: |
          skip=$(python3 -c "
          import tomllib
          with open('Cargo.toml', 'rb') as f:
              data = tomllib.load(f)
          print(str(data.get('workspace', {}).get('metadata', {}).get('dylint', {}).get('skip', False)).lower())
          ")
          echo "skip=$skip" >> "$GITHUB_OUTPUT"
      - name: Setup ssh-agent
        if: ${{ steps.check.outputs.skip != 'true' && inputs.requires-private-deps == true }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
            ${{ secrets.SSH_PRIVATE_KEY_2 }}
            ${{ secrets.SSH_PRIVATE_KEY_3 }}
      - name: Install nightly toolchain
        if: steps.check.outputs.skip != 'true'
        run: rustup toolchain install ${{ env.NIGHTLY }} --component rustc-dev --component llvm-tools-preview
      - name: Install cargo-dylint
        if: steps.check.outputs.skip != 'true'
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-dylint@5.0.0
      - name: Install dylint-link
        if: steps.check.outputs.skip != 'true'
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: dylint-link@5.0.0
      - name: Checkout lints
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          repository: init4tech/lints
          path: .lints
      - name: Cache lint build
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: .lints/instrument-fields/target
          key: dylint-lint-${{ env.NIGHTLY }}-${{ hashFiles('.lints/instrument-fields/Cargo.lock') }}
          restore-keys: dylint-lint-${{ env.NIGHTLY }}-
      - name: Build lints
        if: steps.check.outputs.skip != 'true'
        working-directory: .lints/instrument-fields
        run: cargo +${{ env.NIGHTLY }} build
      - uses: Swatinem/rust-cache@v2
        if: steps.check.outputs.skip != 'true'
        with:
          prefix-key: dylint
      - name: Run dylint
        if: steps.check.outputs.skip != 'true'
        env:
          DYLINT_LIBRARY_PATH: ${{ github.workspace }}/.lints/instrument-fields/target/debug
          RUSTFLAGS: "-D bare_instrument_fields"
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: cargo +${{ env.NIGHTLY }} dylint --all --no-deps --workspace

  docs:
    name: Docs
    runs-on:
      group: init4-runners
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup ssh-agent
        if: ${{ inputs.requires-private-deps == true }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
            ${{ secrets.SSH_PRIVATE_KEY_2 }}
            ${{ secrets.SSH_PRIVATE_KEY_3 }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - if: ${{ inputs.require-lockfile == true }}
        name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: cargo doc --no-deps --document-private-items --all-features --workspace --profile ${{ inputs.rust-profile }} --locked
      - if: ${{ inputs.require-lockfile == false }}
        name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: cargo doc --no-deps --document-private-items --all-features --workspace --profile ${{ inputs.rust-profile }}
